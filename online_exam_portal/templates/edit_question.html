<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    
    </head>
<body>

<h2>Edit Question</h2>

<form method="POST">

    Question: <input type="text" name="question" value="{{ q.question }}"><br><br>

    Option1: <input type="text" name="option1" value="{{ q.option1 }}"><br>
    Option2: <input type="text" name="option2" value="{{ q.option2 }}"><br>
    Option3: <input type="text" name="option3" value="{{ q.option3 }}"><br>
    Option4: <input type="text" name="option4" value="{{ q.option4 }}"><br><br>

    Answer: <input type="text" name="answer" value="{{ q.answer }}"><br><br>

    <button type="submit">Update</button>

</form>

</body>
</html>
