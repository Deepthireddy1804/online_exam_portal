<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
    body {
        background: #f4f6f9;  /* light grey */
    }

    .card {
        background: #ffffff;
        border-radius: 10px;
        padding: 15px;
        margin: 15px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
</style>

</head>
<body>

<h2 style="text-align:center;">Exam Result 🎉</h2>

<p style="text-align:center; font-size:18px;">
    Your Score: {{ score }} / {{ total }}
</p>

<p style="text-align:center; color:green;">
    Correct Answers: {{ score }}
</p>

<p style="text-align:center; color:red;">
    Wrong Answers: {{ wrong }}
</p>

<br>

<div style="text-align:center;">
    <a href="/student_dashboard">
        <button>Done</button>
    </a>
</div>

<hr>

<h3 style="text-align:center;">Review Your Answers</h3>

{% for q in questions %}

    <div style="border:1px solid #ccc; padding:10px; margin:15px;">

        <p><b>Q{{ loop.index }}: {{ q.question }}</b></p>

        
        <p style="color:rgb(0, 0, 0);">
            Correct Answer: {{ q.answer }}
        </p>

        <p style="color:rgb(236, 236, 242);">
            
    </div>

{% endfor %}

</body>
</html>
